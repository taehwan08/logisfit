<!-- 상단 네비게이션 바 -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
        <!-- 모바일 사이드바 토글 -->
        <button class="btn btn-link sidebar-toggle-btn d-lg-none" type="button">
            <i class="bi bi-list fs-4"></i>
        </button>

        <!-- 페이지 제목 (모바일에서도 표시) -->
        <span class="navbar-brand mb-0 navbar-page-title">
            {% block page_title %}{% endblock %}
        </span>

        <!-- 우측 메뉴 -->
        <ul class="navbar-nav ms-auto">
            <!-- 알림 -->
            <li class="nav-item dropdown">
                <a class="nav-link position-relative" href="#" id="notificationDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-bell fs-5"></i>
                    <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle"
                          id="notifBadge" style="display:none; font-size:0.65rem; padding:3px 6px;">0</span>
                </a>
                <div class="dropdown-menu dropdown-menu-end shadow-sm" style="width:340px; max-height:400px; overflow-y:auto;">
                    <div class="d-flex justify-content-between align-items-center px-3 py-2">
                        <h6 class="mb-0 fw-semibold" style="font-size:0.9rem;">알림</h6>
                        <button class="btn btn-link btn-sm text-muted p-0" onclick="markAllNotificationsRead()" style="font-size:0.78rem; text-decoration:none;">
                            모두 읽음
                        </button>
                    </div>
                    <div class="dropdown-divider mt-0"></div>
                    <div id="notifDropdownList">
                        <div class="text-center text-muted py-3" style="font-size:0.85rem;">새로운 알림이 없습니다</div>
                    </div>
                </div>
            </li>

            <!-- 사용자 메뉴 -->
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    <span class="d-none d-md-inline">{{ user.name }}</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <span class="dropdown-item-text text-muted">
                            {{ user.email }}
                        </span>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                            <i class="bi bi-person me-2"></i>프로필 설정
                        </a>
                    </li>
                    {% if user.is_superuser %}
                        <li>
                            <a class="dropdown-item" href="{% url 'admin:index' %}" target="_blank">
                                <i class="bi bi-gear me-2"></i>관리자 사이트
                            </a>
                        </li>
                    {% endif %}
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i>로그아웃
                        </a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</nav>
